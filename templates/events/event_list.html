{% extends "base.html" %}

{% block content %}

<h2 class="page-title">Upcoming Events</h2>

{% for event in events %}

<div class="card">

<h3>{{ event.title }}</h3>

<p>{{ event.description }}</p>

<p><strong>Club:</strong> {{ event.club.name }}</p>

<p><strong>Date:</strong> {{ event.date }}</p>

<p><strong>Location:</strong> {{ event.location }}</p>

</div>

{% empty %}

<p>No events available.</p>

{% endfor %}

{% endblock %}
