{% extends "base.html" %}

{% block content %}

<h2 class="page-title">Attendance List</h2>

{% for a in attendance %}

<div class="card">

<p><strong>User:</strong> {{ a.registration.user.username }}</p>

<p><strong>Event:</strong> {{ a.registration.event.title }}</p>

<p><strong>Attended:</strong> {{ a.attended }}</p>

</div>

{% endfor %}

{% endblock %}
