{% extends "base.html" %} {% block content %}

<h2 class="page-title">University Clubs</h2>

{% for club in clubs %}

<div class="card">
  <h3>{{ club.name }}</h3>

  <p>{{ club.description }}</p>

  {% if club.id in membership_dict %}

  <span class="status pending">Request Pending</span>

  {% else %}

  <a href="/clubs/join/{{ club.id }}/" class="btn-primary">Join Club</a>

  {% endif %}
</div>

{% endfor %} {% endblock %}
