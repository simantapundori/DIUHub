{% load static %}

<!doctype html>
<html>
  <head>
    <title>Login | DIUHub</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body class="auth-page">
    <div class="auth-container">
      <img src="{% static 'images/diuhub_logo.png' %}" class="auth-logo" />

      <h2>Welcome Back</h2>

      <form method="post">
        {% csrf_token %}

        <input
          type="text"
          name="username"
          placeholder="Username"
          class="input-field"
        />

        <input
          type="password"
          name="password"
          placeholder="Password"
          class="input-field"
        />

        <button class="btn-primary">Login</button>
      </form>

      <p class="auth-link">
        Don't have an account?
        <a href="/register/">Register</a>
      </p>
    </div>
  </body>
</html>
